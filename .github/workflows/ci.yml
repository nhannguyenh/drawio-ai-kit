name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 20
      - run: npm ci
      - name: Audit dependencies (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high
      - name: Tests
        run: npm test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Install Semgrep
        run: pip install semgrep
      - name: Semgrep (deep SAST + secrets)
        run: >
          semgrep scan --error --metrics=off
          --config p/security-audit
          --config p/secrets
          --config p/owasp-top-ten
          --config p/command-injection
          --config p/javascript
          --config p/python
      - name: Secret scan (gitleaks)
        run: |
          VER=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --no-git --source . --no-banner --redact --exit-code 1
